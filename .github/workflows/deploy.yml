name: 自动部署博客到服务器
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 安装依赖 & 打包博客
        run: pnpm install && pnpm build

      - name: 上传到服务器
        uses: appleboy/scp-action@master
        with:
          host: 156.238.232.186
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "dist/*"
          target: "/var/www/fuwari"